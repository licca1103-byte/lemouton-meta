<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Mouton — META 광고소재</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0F4A2E;--gray-bg:#F7F7F5;--gray-line:#E8E8E4;
  --gray-text:#6B6B67;--gray-hint:#ABABAB;--black:#1A1A18;--white:#fff;--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--gray-bg);color:var(--black);-webkit-font-smoothing:antialiased}
header{background:var(--white);border-bottom:1px solid var(--gray-line);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px}
.logo-text{font-size:14px;font-weight:600}
.logo-sub{font-size:12px;color:var(--gray-hint);font-weight:400;margin-left:4px}
.header-right{display:flex;align-items:center;gap:10px}
.refresh-btn{font-size:12px;padding:6px 12px;border:1px solid var(--gray-line);border-radius:6px;cursor:pointer;background:transparent;color:var(--gray-text);display:flex;align-items:center;gap:5px}
.refresh-btn:hover{background:var(--gray-bg)}
.last-updated{font-size:11px;color:var(--gray-hint)}
.toolbar{background:var(--white);border-bottom:1px solid var(--gray-line);padding:0 2rem;display:flex;align-items:center;gap:8px;height:48px}
.filter-btn{padding:4px 12px;font-size:12px;font-weight:500;border:1px solid var(--gray-line);border-radius:100px;cursor:pointer;background:transparent;color:var(--gray-text);transition:all .1s}
.filter-btn.on{background:var(--green);color:var(--white);border-color:var(--green)}
.sep{width:1px;height:18px;background:var(--gray-line);margin:0 4px}
.count{font-size:12px;color:var(--gray-hint);margin-left:auto}
main{max-width:1280px;margin:0 auto;padding:2rem}
.month-section{margin-bottom:2.5rem}
.month-label{font-size:11px;font-weight:600;color:var(--gray-hint);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--gray-line)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1rem}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-line);overflow:hidden;transition:box-shadow .15s,transform .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.img-wrap{width:100%;aspect-ratio:9/16;background:var(--gray-bg);display:flex;align-items:center;justify-content:center;overflow:hidden}
.no-img{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--gray-hint);font-size:11px}
.no-img svg{width:28px;height:28px;opacity:.35}
.card-body{padding:14px}
.card-name{font-size:13px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.card-date{font-size:11px;color:var(--gray-hint)}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px}
.p-shopify{background:#DFF2E9;color:#0A5C35}
.p-rakuten{background:#FDEAE3;color:#7A2E14}
.p-on{background:#DFF2E9;color:#0A5C35}
.p-off{background:var(--gray-line);color:var(--gray-text)}
.lang{font-size:10px;font-weight:600;color:var(--gray-hint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.copy{font-size:12px;line-height:1.65;color:var(--gray-text);white-space:pre-wrap}
.path{font-size:10px;color:var(--gray-hint);margin-top:8px;word-break:break-all;line-height:1.5}
.divider{height:1px;background:var(--gray-line);margin:10px 0}
.state{text-align:center;padding:4rem 2rem;color:var(--gray-hint);font-size:13px}
.state.error{color:#c0392b}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--gray-line);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  header,.toolbar{padding:0 1rem}
  main{padding:1rem}
  .grid{grid-template-columns:repeat(2,1fr);gap:.75rem}
  .logo-sub,.last-updated{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="5" stroke="white" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="2" fill="white"/>
      </svg>
    </div>
    <span class="logo-text">Le Mouton <span class="logo-sub">META 광고소재</span></span>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      새로고침
    </button>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn on" onclick="setFilter(this,'전체')">전체</button>
  <button class="filter-btn" onclick="setFilter(this,'Shopify')">Shopify</button>
  <button class="filter-btn" onclick="setFilter(this,'Rakuten')">Rakuten</button>
  <div class="sep"></div>
  <button class="filter-btn" id="activeBtn" onclick="toggleActive(this)">운영중만</button>
  <span class="count" id="cnt"></span>
</div>

<main><div id="root"><div class="state"><div class="spinner"></div><br>데이터 불러오는 중...</div></div></main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZPmFUm9gil90eg5R253dZ_q4eDIPhk0YAwde7oywqq4j3BdtpyFpy8vIa8WfjPEnEN9WqhXtzQWXG/pub?gid=1091877158&single=true&output=csv';

let ALL = [];
let chFilter = '전체';
let activeOnly = false;

async function loadData() {
  document.getElementById('root').innerHTML = '<div class="state"><div class="spinner"></div><br>데이터 불러오는 중...</div>';
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('시트를 불러올 수 없어요 (' + res.status + ')');
    const text = await res.text();
    ALL = parseCSV(text);
    const now = new Date();
    document.getElementById('lastUpdated').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;
    render();
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="state error">❌ ${e.message}<br><br>시트가 "웹에 게시"되어 있는지 확인해주세요</div>`;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim().replace(/\r/,'')] = (vals[i]||'').trim().replace(/\r/,''));
    return obj;
  });
}

function splitLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
    else { cur += c; }
  }
  res.push(cur);
  return res;
}

function setFilter(btn, v) {
  chFilter = v;
  document.querySelectorAll('.filter-btn:not(#activeBtn)').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function toggleActive(btn) {
  activeOnly = !activeOnly;
  btn.classList.toggle('on', activeOnly);
  render();
}

function render() {
  const list = ALL.filter(a => {
    if (chFilter !== '전체' && a['채널'] !== chFilter) return false;
    if (activeOnly && a['운영여부'] !== '운영중') return false;
    return true;
  });
  document.getElementById('cnt').textContent = list.length + '건';
  if (!list.length) { document.getElementById('root').innerHTML = '<div class="state">해당하는 소재가 없습니다</div>'; return; }

  const months = [...new Set(list.map(a => a['월'] || '기타'))];
  document.getElementById('root').innerHTML = months.map(m => {
    const items = list.filter(a => (a['월']||'기타') === m);
    return `<div class="month-section">
      <div class="month-label">${m}</div>
      <div class="grid">${items.map(a => {
        const ch = a['채널'] || '';
        const status = a['운영여부'] || '';
        const jp = a['일본어'] || '';
        const kr = a['한국어'] || '';
        const path = a['파일경로'] || '';
        const name = a['소재제목'] || '';
        const pillCh = ch === 'Shopify' ? 'p-shopify' : ch === 'Rakuten' ? 'p-rakuten' : 'p-shopify';
        return `<div class="card">
          <div class="img-wrap">
            <div class="no-img">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              <span>이미지 없음</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-name">${name}</div>
            <div class="card-meta">
              <span class="card-date">${a['작성일']||''}</span>
              ${ch ? `<span class="pill ${pillCh}">${ch}</span>` : ''}
              ${status ? `<span class="pill ${status==='운영중'?'p-on':'p-off'}">${status}</span>` : ''}
            </div>
            ${jp ? `<div class="lang">JP 일본어</div><div class="copy">${jp}</div><div class="divider"></div>` : ''}
            <div class="lang">KR 한국어</div>
            <div class="copy">${kr}</div>
            ${path ? `<div class="path">📁 ${path}</div>` : ''}
          </div>
        </div>`;
      }).join('')}
      </div>
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
